<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        background-color: rgb(0, 54, 163);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    #sos{
        background-color: red;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 200px;
        height: 200px;
        border-radius: 100%;
        border: 5px solid white;
        pointer-events: all;
        cursor: pointer;
    }
    p{
        color: white;
        font-size: 50px;
        font-weight: bolder;
    }
</style>
<body>
    <div id="sos">
        <p>SOS</p>
        <audio id="sound1" src="/Project_SOS/sounds/click.wav"></audio>
        <audio id="sound2" src="/Project_SOS/sounds/playzz-fah-491090.mp3"></audio>
        <audio id="sound3" src="/Project_SOS/sounds/mixkit-modern-technology-select-3124.wav"></audio>
        

        
    </div>
    <script>
      const sound1 = document.getElementById('sound1');
      const sound2 = document.getElementById('sound2');
      const sound3 = document.getElementById('sound3');
      
      
      
      document.getElementById('sos').addEventListener('click',
            function(){
               sound1.play()
               console.log("pressed..!")
            }
        );
        document.getElementById('sos').addEventListener('dblclick',
            function(){
               sound2.play()
               console.log("Double pressed..!")
            }
        );

        document.addEventListener('keydown',
            function(){
               sound2.play()
               console.log("Double pressed..!")
            }
        );
        document.addEventListener('keyup',
            function(){
               return
            }
        );
        document.addEventListener('mouseover',
            function(){
               sound3.play()
               console.log("Double pressed..!")
            }
        );
        document.addEventListener('mouseout',
            function(){
               return
            }
        );
        

        

        
    </script>
</body>
</html>
