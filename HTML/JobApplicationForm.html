<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
</head>
<body>
    <h1>Job Application Form</h1>
    <h3>Please Fill Out the Form Below to Submit Your Job Application!</h3>
    <form action="">
        <label for="name"> Name: </label>
        <input type="text" id="name" placeholder="Enter your Name"><br>
        <label for="email"> Email: </label>
        <input type="email" id="email" placeholder="Enter your Email"><br>
        <label for="phone"> Phone: </label>
        <input type="tel" id="phone" placeholder="Enter your Phone"><br>
        <label for="age"> Age: </label>
        <input type="number" id="age" placeholder="Enter your Age"><br>
        <label for="gender"> Gender: </label>
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female">
        <label for="female">Female</label>
        <br>
        <label for="position"> Position Applied For: </label>
        <select>
            <option value="#">Software Engineer</option>
            <option value="#">Data Analyst</option>
            <option value="#">Product Manager</option>
            <option value="#">UX Designer</option>
        </select> <br>
        <label for="interviewDate">Preferred Interview Date: </label>
        <input type="date" id="interviewDate">
        <br>
        <label for="letter">Cover Letter: </label><br>
        <textarea id="letter" placeholder="Write your cover letter here..."></textarea><br>
        <label for="resume">Upload your Resume: </label>
        <input type="file" id="resume"><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
